services:
  app:
    build: .
    image: trabalho-thread-java:latest
    container_name: trabalho-thread-java
    env_file:
      - .env
    environment:
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - ./dataset_g:/app/dataset_g:ro
      - ./dataset_p:/app/dataset_p:ro
      - ./results:/app/results
      - /tmp/.X11-unix:/tmp/.X11-unix

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: trabalho-thread-java-dev
    working_dir: /app
    env_file:
      - .env
    environment:
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - .:/app
      - ./results:/app/results
      - /tmp/.X11-unix:/tmp/.X11-unix
    command: ["/usr/local/bin/dev-watch.sh"]
